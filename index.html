<!DOCTYPE html>
<html>
<head>

<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#000;
  color:#fff;
}

h1{
  font-size:40px;
}

span{
  color:#00ffcc;
  border-right:2px solid #00ffcc;
  padding-right:5px;
}
</style>

</head>

<body>

<h1>I'm a <span id="text"></span></h1>

<script>
let words = ["Student", "Volunteer", "German Learner", "Content Writer"];

let i = 0;
let j = 0;
let isDeleting = false;

function type(){
  let current = words[i];

  document.getElementById("text").innerHTML = current.substring(0, j);

  if(!isDeleting){
    j++;
  } else {
    j--;
  }

  let speed = isDeleting ? 80 : 140;

  if(!isDeleting && j === current.length){
    speed = 1200;
    isDeleting = true;
  }

  if(isDeleting && j === 0){
    isDeleting = false;
    i = (i + 1) % words.length;
  }

  setTimeout(type, speed);
}

type();
</script>

</body>
</html>
