<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body{
  margin:0;
  padding:0;
  background:#000;
  height:100%;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: Arial;
  color:#fff;
}

h1{
  font-size:40px;
}

span{
  color:#00ffcc;
  border-right:2px solid #00ffcc;
  padding-right:5px;
}
</style>

</head>

<body>

<h1>I'm a <span id="text"></span></h1>

<script>
const words = ["Student", "Volunteer", "German Learner", "Content Writer"];

let i = 0;
let j = 0;
let isDeleting = false;

function type(){

  const current = words[i];

  // ✅ FIX: always safe slicing (no missing last letter)
  const displayText = current.substring(0, j);
  document.getElementById("text").textContent = displayText;

  if(!isDeleting){
    j++;
  } else {
    j--;
  }

  let speed = isDeleting ? 60 : 100;

  // word fully typed → pause
  if(!isDeleting && j > current.length){
    isDeleting = true;
    speed = 800;
  }

  // word fully deleted → next word
  if(isDeleting && j < 0){
    isDeleting = false;
    i = (i + 1) % words.length;
    j = 0;
  }

  setTimeout(type, speed);
}

type();
</script>

</body>
</html>
