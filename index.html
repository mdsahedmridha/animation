<!DOCTYPE html>
<html>
<head>
<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#fff;
}

h1{
  font-size:40px;
}

span{
  color:#0d6efd;
  border-right:2px solid black;
  padding-right:5px;
}
</style>
</head>

<body>

<h1>I'm a <span id="text"></span></h1>

<script>
let words = ["Student", "Volunteer", "German Learner", "Content Writer"];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;

function type(){
  current = words[i];

  if(isDeleting){
    document.getElementById("text").innerHTML = current.substring(0, j--);
  } else {
    document.getElementById("text").innerHTML = current.substring(0, j++);
  }

  if(!isDeleting && j === current.length){
    isDeleting = true;
    setTimeout(type, 1000);
    return;
  }

  if(isDeleting && j === 0){
    isDeleting = false;
    i = (i + 1) % words.length;
  }

  setTimeout(type, isDeleting ? 60 : 120);
}

type();
</script>

</body>
</html>
